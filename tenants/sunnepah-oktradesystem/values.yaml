# Orbit Tenant — sunnepah-oktradesystem
# Plan: starter | Re-provisioned from scratch with multi-component structure

tenant:
  slug: sunnepah-oktradesystem
  namespace: tenant-sunnepah-oktradesystem-prod
  plan: starter

components:
  backend:
    enabled: true
    type: backend
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-dc27324
      pullPolicy: Always
    port: 5000
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env: []
    command: []
    livenessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3

  frontend:
    enabled: true
    type: frontend
    image:
      repository: ghcr.io/sunnepah/oktradesystem-frontend
      tag: main-dc27324
      pullPolicy: Always
    port: 80
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []
    command: []
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

  worker:
    enabled: false
    type: worker
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-dc27324
      pullPolicy: Always
    port: 0
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env: []
    command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info"]
    livenessProbe: {}
    readinessProbe: {}

postgres:
  enabled: true

valkey:
  enabled: true

monitoring:
  enabled: false

secrets:
  enabled: true
