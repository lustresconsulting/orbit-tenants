tenant:
  slug: oktradesystem-a06e9b16
  namespace: t-oktradesystem-a06e9b16-prod
  plan: starter
components:
  backend:
    enabled: true
    type: backend
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-48db24d
      pullPolicy: Always
    port: 5000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    command: []
    secrets:
    - key: DATABASE_URL
    - key: REDIS_URL
    - key: CACHE_URL
      remoteKey: REDIS_URL
    livenessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
  frontend:
    enabled: true
    type: frontend
    image:
      repository: ghcr.io/sunnepah/oktradesystem-frontend
      tag: main-48db24d
      pullPolicy: Always
    port: 3000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env:
    - name: VITE_API_URL
      value: http://api-oktradesystem-a06e9b16-backend.t-oktradesystem-a06e9b16-prod.svc.cluster.local/api
    - name: VITE_WEBSOCKET_URL
      value: ws://api-oktradesystem-a06e9b16-backend.t-oktradesystem-a06e9b16-prod.svc.cluster.local
    - name: NODE_ENV
      value: production
    - name: VITE_APP_TITLE
      value: Trading System Production
    command: []
    secrets: []
    livenessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
  celery-worker:
    enabled: true
    type: worker
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-8709d8c
      pullPolicy: Always
    port: 8000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    command:
    - celery
    - -A
    - src.celery_app
    - worker
    - --loglevel=debug
    - --queues=price_updates,historical_updates
    secrets:
    - key: DATABASE_URL
    - key: REDIS_URL
    - key: CACHE_URL
      remoteKey: REDIS_URL
  celery-beat:
    enabled: true
    type: worker
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-8709d8c
      pullPolicy: Always
    port: 8000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    command:
    - celery
    - -A
    - src.celery_app
    - beat
    - --loglevel=debug
    secrets:
    - key: DATABASE_URL
    - key: REDIS_URL
    - key: CACHE_URL
      remoteKey: REDIS_URL
postgres:
  enabled: true
valkey:
  enabled: true
monitoring:
  enabled: false
secrets:
  enabled: true
migration:
  enabled: true
  command: alembic -c /app/alembic.ini upgrade head
  image:
    repository: ghcr.io/sunnepah/oktradesystem
    tag: main-8709d8c
