tenant:
  slug: oktradesystem-8846fca8
  namespace: t-oktradesystem-8846fca8-prod
  plan: starter
components:
  backend:
    enabled: true
    type: backend
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-d2d2171
      pullPolicy: Always
    port: 5000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    command: []
    livenessProbe:
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 60
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
  worker:
    enabled: true
    type: worker
    # Worker uses same image as backend — no separate worker image exists
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-d2d2171
      pullPolicy: Always
    port: 0
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env: []
    # Celery app lives at src/celery_app.py → module: src.celery_app
    command: ["celery", "-A", "src.celery_app", "worker", "--loglevel=info"]
    # No HTTP probes — Helm chart skips probes for type: worker
  frontend:
    enabled: true
    type: frontend
    image:
      repository: ghcr.io/sunnepah/oktradesystem-frontend
      tag: main-d2d2171
      pullPolicy: Always
    port: 3000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    command: []
    livenessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
postgres:
  enabled: true
valkey:
  enabled: true
monitoring:
  enabled: false
secrets:
  enabled: true
