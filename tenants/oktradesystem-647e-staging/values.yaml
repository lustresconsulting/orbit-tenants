components:
  backend:
    enabled: true
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-d926707
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 60
      periodSeconds: 10
    migrationCommand: alembic -c /app/alembic.ini upgrade head
    port: 5000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    type: backend
  celery-beat:
    command:
    - celery
    - -A
    - src.celery_app
    - beat
    - --loglevel=info
    enabled: true
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-d926707
    livenessProbe:
      failureThreshold: 3
      initialDelaySeconds: 60
      periodSeconds: 10
      tcpSocket:
        port: null
    readinessProbe:
      failureThreshold: 3
      initialDelaySeconds: 30
      periodSeconds: 10
      tcpSocket:
        port: null
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    type: worker
  celery-worker:
    command:
    - celery
    - -A
    - src.celery_app
    - worker
    - --loglevel=info
    enabled: true
    image:
      repository: ghcr.io/sunnepah/oktradesystem-backend
      tag: main-d926707
    livenessProbe:
      failureThreshold: 3
      initialDelaySeconds: 60
      periodSeconds: 10
      tcpSocket:
        port: null
    readinessProbe:
      failureThreshold: 3
      initialDelaySeconds: 30
      periodSeconds: 10
      tcpSocket:
        port: null
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    type: worker
  frontend:
    enabled: true
    image:
      repository: ghcr.io/lustresconsulting/orbit-tenant-oktradesystem-647e-staging-frontend
      tag: 2e4722a48fd93f0285a9ececa3244e701cb61b79
    port: 3000
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    type: frontend
customDomain:
  enabled: false
  hostname: ''
database:
  mode: orbit
hpa:
  enabled: true
  maxReplicas: 10
  minReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  hostname: oktradesystem-647e-staging.orbit.lustres.dev
  tls: true
monitoring:
  enabled: true
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: '1'
  serviceMonitor:
    interval: 30s
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
pdb:
  enabled: true
  minAvailable: 1
postgres:
  database: appdb
  enabled: true
  existingSecret: tenant-db-credentials
  existingSecretKey: password
  instances: 1
  postgresUser: tenant
  storage:
    size: 5Gi
    storageClass: local-path
  version: '17'
secrets:
  enabled: false
tenant:
  namespace: t-oktradesystem-647e-staging
  orgId: 1634917b-5c45-4d56-a8d5-9017cc56b7da
  plan: starter
  resourcePrefix: t-oktradesystem-647e-staging
  slug: oktradesystem-647e-staging
valkey:
  enabled: true
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
  storage:
    size: 1Gi
    storageClass: local-path
