# Tenant: ecomlit-web-79cb-staging | Plan: starter
# components: hand-written (agent LLM unavailable), image tag managed by builder

components:
  mapp:
    enabled: true
    envFrom:
    - secretRef:
        name: mapp-env
    image:
      repository: ghcr.io/lustresconsulting/orbit-tenant-ecomlit-web-79cb-staging-mapp
      tag: latest
    port: 3000
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    type: frontend

tenant:
  slug: ecomlit-web-79cb-staging
  namespace: t-ecomlit-web-79cb-staging
  resourcePrefix: t-ecomlit-web-79cb-staging
  plan: starter

database:
  mode: external

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

postgres:
  enabled: false

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "7.2-alpine"
  storage:
    size: 1Gi
    storageClass: local-path
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password

ingress:
  enabled: true
  hostname: ecomlit-web-79cb-staging.orbit.lustres.dev
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  tls: true

customDomain:
  enabled: false
  hostname: ""

monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    port: metrics
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
