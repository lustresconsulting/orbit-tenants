components:
  merchant-service:
    command:
    - node
    - /app/apps/merchant-service/dist/main.js
    enabled: true
    env:
    - name: DB_TYPE
      value: postgresql
    envFrom:
    - secretRef:
        name: merchant-service-env
    image:
      repository: ghcr.io/lustresconsulting/orbit-tenant-ecomlit-api-5935-staging-merchant-service
      tag: 3ebc72b06aec89fe041fca5cc520d2ce204429dd
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
    migrationCommand: pnpm run-migration
    port: 8000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    type: backend
customDomain:
  enabled: false
  hostname: ""
database:
  mode: external
hpa:
  enabled: true
  maxReplicas: 10
  minReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  hostname: ecomlit-api-5935-staging.orbit.lustres.dev
  tls: true
monitoring:
  enabled: true
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
  serviceMonitor:
    interval: 30s
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
pdb:
  enabled: true
  minAvailable: 1
tenant:
  namespace: t-ecomlit-api-5935-staging
  plan: starter
  resourcePrefix: t-ecomlit-api-5935-staging
  slug: ecomlit-api-5935-staging
valkey:
  enabled: true
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
  storage:
    size: 1Gi
    storageClass: local-path
