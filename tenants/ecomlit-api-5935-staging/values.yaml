components:
  admin-service:
    enabled: true
    envFrom:
    - secretRef:
        name: admin-service-env
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
    port: 8000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  api-gateway:
    enabled: true
    envFrom:
    - secretRef:
        name: api-gateway-env
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
    port: 8000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  consumer-service:
    enabled: true
    envFrom:
    - secretRef:
        name: consumer-service-env
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
    port: 8000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  merchant-service:
    enabled: true
    envFrom:
    - secretRef:
        name: merchant-service-env
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10
    port: 8000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
customDomain:
  enabled: false
  hostname: ""
database:
  mode: orbit
hpa:
  enabled: true
  maxReplicas: 10
  minReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  hostname: ecomlit-api-5935-staging.orbit.lustres.dev
  tls: true
monitoring:
  enabled: true
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
  serviceMonitor:
    interval: 30s
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
pdb:
  enabled: true
  minAvailable: 1
postgres:
  database: appdb
  enabled: true
  existingSecret: tenant-db-credentials
  existingSecretKey: password
  instances: 1
  postgresUser: tenant
  storage:
    size: 5Gi
    storageClass: local-path
  version: "17"
tenant:
  namespace: t-ecomlit-api-5935-staging
  plan: starter
  resourcePrefix: t-ecomlit-api-5935-staging
  slug: ecomlit-api-5935-staging
valkey:
  enabled: true
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
  storage:
    size: 1Gi
    storageClass: local-path
