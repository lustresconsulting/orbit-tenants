components:
  consumer-service:
    command:
    - node
    - /app/apps/consumer-service/dist/main.js
    enabled: true
    env:
    - name: DB_TYPE
      value: postgresql
    envFrom:
    - secretRef:
        name: tenant-secrets-consumer-service
    image:
      repository: ghcr.io/lustresconsulting/orbit-tenant-ecomlit-api-5935-staging-consumer-service
      tag: ead4ccf376df603ecbe2c7cbc26c8daccbf6e673
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 10
    port: 5000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 128Mi
    type: backend
  merchant-service:
    command:
    - node
    - /app/apps/merchant-service/dist/main.js
    enabled: true
    env:
    - name: DB_TYPE
      value: postgresql
    envFrom:
    - secretRef:
        name: tenant-secrets-merchant-service
    image:
      repository: ghcr.io/lustresconsulting/orbit-tenant-ecomlit-api-5935-staging-merchant-service
      tag: ae35d65437576ba739739437ea3d68db2c0c9b80
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 30
      periodSeconds: 10
    migrationCommand: pnpm run-migration
    port: 5000
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 128Mi
    type: backend
customDomain:
  enabled: false
  hostname: ''
database:
  mode: external
hpa:
  enabled: true
  maxReplicas: 10
  minReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  hostname: ecomlit-api-5935-staging.orbit.lustres.dev
  tls: true
monitoring:
  enabled: true
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: '1'
  serviceMonitor:
    interval: 30s
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
pdb:
  enabled: true
  minAvailable: 1
postgres:
  enabled: false
secrets:
  enabled: false
tenant:
  namespace: t-ecomlit-api-5935-staging
  orgId: 0275c4a1-f131-4590-81cd-b55d226517b7
  plan: starter
  resourcePrefix: t-ecomlit-api-5935-staging
  slug: ecomlit-api-5935-staging
valkey:
  enabled: true
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
  storage:
    size: 1Gi
    storageClass: local-path
