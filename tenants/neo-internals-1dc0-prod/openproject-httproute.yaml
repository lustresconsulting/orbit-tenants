apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: t-neo-internals-1dc0-prod-openproject
  namespace: t-neo-internals-1dc0-prod
  labels:
    # NOTE: deliberately no `app.kubernetes.io/instance` label. That label is
    # ArgoCD's default tracking key — adding it makes the tenant wrapper app
    # (t-neo-internals-1dc0-prod) claim ownership, and because this HTTPRoute
    # isn't in the charts/tenant-app Helm source, selfHeal+prune deletes it on
    # the next sync. Matches the working pattern on staging-api.neospend.com
    # and the oakknights custom-domain routes. See ROADMAP Phase 999.8.
    orbit.sh/component: openproject
    orbit.sh/tenant: neo-internals-1dc0-prod
spec:
  hostnames:
    - openproject-neo-internals-1dc0-prod.orbit.lustres.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: orbit-gateway
      namespace: orbit-system
      sectionName: websecure
  rules:
    # Collaborative editing websocket — OpenProject routes /hocuspocus to the
    # hocuspocus sidecar on port 1234.
    - matches:
        - path:
            type: PathPrefix
            value: /hocuspocus
      backendRefs:
        - group: ""
          kind: Service
          name: t-neo-internals-1dc0-prod-openproject-hocuspocus
          port: 1234
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: t-neo-internals-1dc0-prod-openproject
          port: 8080
          weight: 1
