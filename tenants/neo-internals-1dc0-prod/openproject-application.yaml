apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: t-neo-internals-1dc0-prod-openproject
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: t-neo-internals-1dc0-prod
  source:
    repoURL: https://charts.openproject.org
    chart: openproject
    targetRevision: "*"
    helm:
      values: |
        # develop: true is required for OpenProject 17 on this chart:
        #   1. disables readOnlyRootFilesystem (Rails boots fine either way
        #      locally but MiniMagick 5.3.1's Dir.tmpdir check rejects our
        #      other option — the emptyDir /tmp mount — for not having the
        #      sticky bit)
        #   2. skips the tmp-emptyDir volumes (which Ruby rejects for the
        #      same reason — `rwxrws-rwx` not `rwxrwxrwt`)
        # The downside: chart's secret_core.yaml hard-codes
        # OPENPROJECT_HTTPS=false whenever develop is truthy. We override
        # that below in the environment: block; the extra-env Secret loads
        # AFTER core in envFrom, so last-wins gives us HTTPS=true.
        develop: true

        # Pin image to the version we migrated to (2026-04-23). Chart default
        # currently matches, but the chart's rolling default is what bit us
        # during the migration — freeze it here so a future chart bump can't
        # silently upgrade the image underneath us.
        image:
          tag: "17.3.1-slim"

        openproject:
          # Public vanity host. Internal host
          # openproject-neo-internals-1dc0-prod.orbit.lustres.dev stays reachable
          # via openproject-httproute.yaml for operator debugging, but
          # system-generated URLs (mails, OAuth, asset paths) use the vanity.
          host: project.neospend.com
          https: true

        postgresql:
          bundled: false
          connection:
            host: t-neo-internals-1dc0-prod-pg-rw
            port: 5432
          auth:
            database: appdb
            username: tenant
            existingSecret: tenant-db-credentials
            secretKeys:
              userPasswordKey: password

        memcached:
          bundled: true

        persistence:
          enabled: true
          storageClassName: local-path
          size: 10Gi
          accessModes:
            - ReadWriteOnce

        seeder:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # root-level "resources" controls the web deployment (chart structure).
        # Web runs Puma + full Rails stack; observed steady-state ~1.3 GiB with
        # SMTP + collaborative editing enabled, and Rails boot spikes above
        # that.
        #
        # 47-01 (2026-04-25) bumped limit 1.5Gi -> 2Gi to stop OOMKills, but
        # left request at 1Gi. ~1h post-bump kubelet evicted the pod anyway
        # because the 1.3 GiB working set was above the 1Gi request and node-2
        # hit its 1500Mi soft eviction threshold (Phase 47 STAB-01 follow-up
        # 2026-04-25T03:13Z).
        #
        # Setting request == limit (2Gi) gives the pod Guaranteed QoS class,
        # which kubelet's eviction selector treats as last-to-go. Working set
        # 1.3 GiB now sits comfortably under request, so the pod is no longer
        # an eviction candidate when other pods drift the node into pressure.
        resources:
          requests:
            cpu: 250m
            memory: 2Gi
          limits:
            cpu: 1000m
            memory: 2Gi

        # workers.default controls the worker-default deployment.
        # Workers load the full OpenProject Rails stack + Good Job runner; the
        # chart default of 512Mi limit OOM-kills on boot.
        #
        # 2026-04-25 STAB-01 follow-up: worker working set was ~600 MiB with
        # 512 MiB request, making it the next eviction candidate after web
        # was lifted out. Bumping request to 1Gi (== limit) gives Guaranteed
        # QoS, same reasoning as web above.
        workers:
          default:
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 500m
                memory: 1Gi

        hocuspocus:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Platform uses Gateway API (HTTPRoute + orbit-gateway). The chart's
        # classic Ingress doesn't render a spec.tls block and therefore serves
        # no cert on :443 — disable it and route via openproject-httproute.yaml
        # in this directory, matching every other tenant on Orbit.
        ingress:
          enabled: false

        # Secret values (SECRET_KEY_BASE, SMTP password) come from the
        # tenant-secrets-backend Secret, which is auto-synced from Infisical
        # (workspace neo-internals-1dc0-prod) by the operator-managed
        # tenant-secrets-backend ExternalSecret via dataFrom.find wildcard.
        environment:
          # Override the chart's develop-forced HTTPS=false (see top-level
          # develop: true comment). This Secret loads AFTER *-openproject-core
          # in envFrom, so last-wins gives us HTTPS=true.
          OPENPROJECT_HTTPS: "true"
          OPENPROJECT_SECRET__KEY__BASE:
            valueFrom:
              secretKeyRef:
                name: tenant-secrets-backend
                key: OPENPROJECT_SECRET_KEY_BASE
          # Timezone — app renders timestamps in CT per legacy deployment
          TZ: America/Chicago
          # Resend SMTP — mirrors legacy neolab config
          OPENPROJECT_EMAIL__DELIVERY__METHOD: smtp
          OPENPROJECT_EMAIL__FROM: noreply@neospend.com
          OPENPROJECT_SMTP__ADDRESS: smtp.resend.com
          OPENPROJECT_SMTP__PORT: "587"
          OPENPROJECT_SMTP__DOMAIN: project.neospend.com
          OPENPROJECT_SMTP__AUTHENTICATION: login
          OPENPROJECT_SMTP__ENABLE__STARTTLS__AUTO: "true"
          OPENPROJECT_SMTP__OPENSSL__VERIFY__MODE: peer
          OPENPROJECT_SMTP__USER__NAME: resend
          OPENPROJECT_SMTP__PASSWORD:
            valueFrom:
              secretKeyRef:
                name: tenant-secrets-backend
                key: OPENPROJECT_SMTP__PASSWORD

  destination:
    server: https://kubernetes.default.svc
    namespace: t-neo-internals-1dc0-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
