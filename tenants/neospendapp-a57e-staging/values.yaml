components:
  backend:
    enabled: true
    envFrom:
    - secretRef:
        name: tenant-secrets-backend
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: null
      initialDelaySeconds: 60
      periodSeconds: 10
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: null
      initialDelaySeconds: 30
      periodSeconds: 10
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  celery-beat:
    enabled: true
    envFrom:
    - secretRef:
        name: tenant-secrets-celery-beat
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      initialDelaySeconds: 60
      periodSeconds: 10
      tcpSocket:
        port: null
    readinessProbe:
      failureThreshold: 3
      initialDelaySeconds: 30
      periodSeconds: 10
      tcpSocket:
        port: null
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  celery-worker:
    enabled: true
    envFrom:
    - secretRef:
        name: tenant-secrets-celery-worker
    image:
      repository: ""
      tag: latest
    livenessProbe:
      failureThreshold: 3
      initialDelaySeconds: 60
      periodSeconds: 10
      tcpSocket:
        port: null
    readinessProbe:
      failureThreshold: 3
      initialDelaySeconds: 30
      periodSeconds: 10
      tcpSocket:
        port: null
    replicas: 1
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
customDomain:
  enabled: false
  hostname: ""
database:
  mode: orbit
hpa:
  enabled: true
  maxReplicas: 10
  minReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  hostname: neospendapp-a57e-staging.orbit.lustres.dev
  tls: true
migration:
  command: python manage.py migrate --noinput
  enabled: true
monitoring:
  enabled: true
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
  serviceMonitor:
    interval: 30s
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
pdb:
  enabled: true
  minAvailable: 1
postgres:
  database: appdb
  enabled: true
  existingSecret: tenant-db-credentials
  existingSecretKey: password
  instances: 1
  postgresUser: tenant
  storage:
    size: 5Gi
    storageClass: local-path
  version: "17"
secrets:
  enabled: false
tenant:
  namespace: t-neospendapp-a57e-staging
  orgId: 79f99a82-41f8-4d4d-8103-30589731e620
  plan: starter
  resourcePrefix: t-neospendapp-a57e-staging
  slug: neospendapp-a57e-staging
valkey:
  enabled: true
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
  storage:
    size: 1Gi
    storageClass: local-path
