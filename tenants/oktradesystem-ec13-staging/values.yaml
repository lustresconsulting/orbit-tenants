tenant:
  slug: oktradesystem-ec13-staging
  namespace: t-oktradesystem-ec13-staging
  resourcePrefix: t-oktradesystem-ec13-staging
  plan: starter
database:
  mode: orbit
components:
  backend:
    enabled: true
    type: backend
    image:
      repository: nginx
      tag: main-2628e42
      pullPolicy: IfNotPresent
    port: 80
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env: []
    envFrom:
    - secretRef:
        name: backend-env
    command: []
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 15
      periodSeconds: 20
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
  celery-worker:
    enabled: true
    type: celery-worker
    image:
      repository: ghcr.io/sunnepah/oktradesystem-celery-worker
      tag: main-2628e42
      pullPolicy: Always
    port: 3000
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    env: []
    command: []
    livenessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
pdb:
  enabled: true
  minAvailable: 1
postgres:
  enabled: true
  instances: 1
  storage:
    size: 5Gi
    storageClass: local-path
  existingSecret: tenant-db-credentials
  existingSecretKey: password
  postgresUser: tenant
  database: appdb
  version: '17'
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
  storage:
    size: 1Gi
    storageClass: local-path
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
ingress:
  enabled: true
  hostname: oktradesystem-ec13-staging.orbit.lustres.dev
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  tls: true
customDomain:
  enabled: false
  hostname: ''
monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    port: metrics
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: '1'
