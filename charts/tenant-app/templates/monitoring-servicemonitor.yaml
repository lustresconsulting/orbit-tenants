{{- if .Values.monitoring.enabled }}
{{- range $name, $comp := .Values.components }}
{{- if and $comp.enabled (ne $comp.type "worker") }}
# Prometheus ServiceMonitor — scrapes the component's /metrics endpoint
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $.Values.tenant.slug }}-{{ $name }}
  namespace: {{ $.Values.tenant.namespace }}
  labels:
    orbit.sh/tenant: {{ $.Values.tenant.slug }}
    orbit.sh/component: {{ $comp.type }}
    app.kubernetes.io/name: {{ $.Values.tenant.slug }}-{{ $name }}
    app.kubernetes.io/component: monitoring
    release: orbit-monitoring
spec:
  selector:
    matchLabels:
      orbit.sh/tenant: {{ $.Values.tenant.slug }}
      app.kubernetes.io/name: {{ $.Values.tenant.slug }}-{{ $name }}
  namespaceSelector:
    matchNames:
      - {{ $.Values.tenant.namespace }}
  endpoints:
    - port: metrics
      path: {{ $.Values.monitoring.serviceMonitor.path }}
      interval: {{ $.Values.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ $.Values.monitoring.serviceMonitor.scrapeTimeout }}
---
{{- end }}
{{- end }}
{{- end }}
