{{- if .Values.secrets.enabled }}
{{- range $name, $comp := .Values.components }}
{{- if and $comp.enabled $comp.secrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tenant-secrets-{{ $name }}
  namespace: {{ $.Values.tenant.namespace }}
  labels:
    orbit.sh/tenant: {{ $.Values.tenant.slug }}
    orbit.sh/component: {{ $comp.type }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-orbit-tenants
  target:
    name: tenant-secrets-{{ $name }}
    creationPolicy: Owner
  data:
  {{- range $comp.secrets }}
    - secretKey: {{ .key }}
      remoteRef:
        key: /{{ $.Values.tenant.slug }}/{{ .remoteKey | default .key }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
