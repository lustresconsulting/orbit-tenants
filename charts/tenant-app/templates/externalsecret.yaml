{{- if .Values.secrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tenant-app-secrets
  namespace: {{ .Values.tenant.namespace }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-orbit-tenants
  target:
    name: tenant-app-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        path: /{{ .Values.tenant.slug }}
        name:
          regexp: ".*"
{{- end }}

