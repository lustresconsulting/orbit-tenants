{{- if .Values.secrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tenant-app-secrets
  namespace: {{ .Values.tenant.namespace }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical-orbit-tenants
  target:
    name: tenant-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.tenant.slug }}/DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.tenant.slug }}/REDIS_URL
    - secretKey: SECRET_KEY
      remoteRef:
        key: {{ .Values.tenant.slug }}/SECRET_KEY
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.tenant.slug }}/DB_PASSWORD
{{- end }}
