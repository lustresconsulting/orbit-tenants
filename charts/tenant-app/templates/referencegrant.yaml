{{- if .Values.ingress.enabled }}
# ReferenceGrant — allows HTTPRoutes in this tenant namespace to attach to orbit-gateway in orbit-system
# The Gateway API requires this explicit cross-namespace permission
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ include "tenant-app.fullname" . }}-to-gateway
  namespace: {{ .Values.ingress.gatewayNamespace }}
  labels:
    {{- include "tenant-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.tenant.namespace }}
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ingress.gatewayName }}
{{- end }}
