{{- range $name, $comp := .Values.components }}
{{- if and $comp.enabled $comp.migrationCommand }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $.Values.tenant.slug }}-{{ $name }}-migrate-{{ $comp.image.tag | trunc 8 }}
  namespace: {{ $.Values.tenant.namespace }}
  labels:
    orbit.sh/tenant: {{ $.Values.tenant.slug }}
    orbit.sh/component: {{ $comp.type }}
    app.kubernetes.io/name: {{ $.Values.tenant.slug }}-{{ $name }}-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        orbit.sh/tenant: {{ $.Values.tenant.slug }}
        orbit.sh/component: {{ $comp.type }}
        app.kubernetes.io/name: {{ $.Values.tenant.slug }}-{{ $name }}-migrate
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: migrate
          image: {{ $comp.image.repository }}:{{ $comp.image.tag }}
          imagePullPolicy: {{ $comp.image.pullPolicy | default "Always" }}
          command:
            - sh
            - -c
            - {{ $comp.migrationCommand | quote }}
          env:
            # Ensure writable home/caches for package managers (pnpm, nx, corepack) running as non-root
            - name: HOME
              value: /tmp
            - name: NX_DAEMON
              value: "false"
            - name: NX_CACHE_DIRECTORY
              value: /tmp/.nx-cache
            - name: COREPACK_HOME
              value: /tmp/.corepack
          {{- if $comp.env }}
            {{- toYaml $comp.env | nindent 12 }}
          {{- end }}
          {{- if $comp.envFrom }}
          envFrom:
            {{- toYaml $comp.envFrom | nindent 12 }}
          {{- else }}
          envFrom:
            - secretRef:
                name: tenant-secrets-{{ $name }}
                optional: true
          {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nx-cache
              mountPath: /app/.nx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nx-cache
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-pull-secret
---
{{- end }}
{{- end }}
