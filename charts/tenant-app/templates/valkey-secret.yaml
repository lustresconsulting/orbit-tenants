{{- /*
  Valkey credentials secret.
  Generates a random password on first install; stable across upgrades via Helm lookup.
  If a secret already exists (e.g. from a previous install), we leave it untouched.
*/ -}}
{{- $secretName := "tenant-valkey-credentials" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tenant-app.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  password: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}
