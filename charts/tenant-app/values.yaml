# Orbit Tenant App — default values
# These are overridden per-tenant at tenants/{slug}/values.yaml

# --- Tenant identity ---
tenant:
  slug: ""          # Required: e.g. "acme-corp"
  namespace: ""     # Required: e.g. "tenant-acme-corp-prod"
  plan: starter     # starter | growth | scale

# --- App (Deployment + Service + HPA + PDB) ---
app:
  enabled: true
  image:
    repository: nginx          # Overridden by tenant's CI pipeline
    tag: alpine
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8080
  env: []
  # env:
  #   - name: DATABASE_URL
  #     valueFrom:
  #       secretKeyRef:
  #         name: tenant-db-credentials
  #         key: url
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  annotations: {}
  labels: {}

# --- PostgreSQL (CloudNativePG Cluster) ---
postgres:
  enabled: true
  instances: 1           # 1 for starter; 2+ for growth/scale
  storage:
    size: 5Gi
    storageClass: local-path
  # Password stored in secret managed by ExternalSecret
  existingSecret: tenant-db-credentials
  existingSecretKey: password
  postgresUser: tenant
  database: appdb
  version: "17"

# --- Valkey (Redis-compatible, StatefulSet) ---
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  storage:
    size: 1Gi
    storageClass: local-path
  password: ""            # Set via existingSecret
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Ingress (HTTPRoute via Gateway API) ---
ingress:
  enabled: true
  hostname: ""            # Defaults to {slug}.orbit.lustres.dev
  gatewayName: orbit-gateway
  gatewayNamespace: orbit-system
  tls: true

# --- Monitoring (ServiceMonitor + Grafana Dashboard) ---
monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    port: metrics           # Named port on the app Service
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
