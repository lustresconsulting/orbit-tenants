# Orbit Tenant App — default values
# These are overridden per-tenant at tenants/{slug}/values.yaml

# --- Tenant identity ---
tenant:
  slug: ""          # Required: e.g. "acme-corp"
  namespace: ""     # Required: e.g. "tenant-acme-corp-prod"
  plan: starter     # starter | growth | scale

# --- Custom domain (optional) ---
# When enabled, creates an additional HTTPRoute + Certificate for the custom domain.
# Tenant must point a CNAME from their domain to {slug}.orbit.lustres.dev.
customDomain:
  enabled: false
  hostname: ""

# --- Database mode ---
# "orbit" = CNPG PostgreSQL provisioned in-namespace (default)
# "external" = user-provided connection string (Supabase, Neon, etc.)
database:
  mode: orbit

# --- Components (Deployment + Service + HTTPRoute per component) ---
# Each key is a component name (backend, frontend, worker, etc.)
# Each component gets its own Deployment; non-worker components also get a Service + HTTPRoute.
components: {}

# --- PostgreSQL (CloudNativePG Cluster) ---
postgres:
  enabled: true
  instances: 1           # 1 for starter; 2+ for growth/scale
  storage:
    size: 5Gi
    storageClass: local-path
  existingSecret: tenant-db-credentials
  existingSecretKey: password
  postgresUser: tenant
  database: appdb
  version: "17"

# --- Valkey (Redis-compatible, StatefulSet) ---
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  storage:
    size: 1Gi
    storageClass: local-path
  existingSecret: tenant-valkey-credentials
  existingSecretKey: password
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Secrets (mounted as envFrom on every component) ---
# The orbit operator emits a single per-tenant Secret (default name:
# "tenant-secrets-backend") in the tenant namespace via ESO. All sub-components
# in this chart mount that same Secret. The legacy chart-emitted ExternalSecret
# (templates/externalsecret.yaml) is dormant unless a component declares
# `secrets:` in values.yaml — left in place for forward compatibility.
secrets:
  enabled: true
  # Name of the operator-emitted Secret in the tenant namespace.
  # Override per-tenant if the operator's component model changes.
  secretName: tenant-secrets-backend

# --- Monitoring (ServiceMonitor + Grafana Dashboard) ---
monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    port: metrics
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
